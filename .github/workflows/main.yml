name: Build
on: [push]
jobs:
  job1:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pywinauto
      - name: Build EXE
        run: pyinstaller --onefile --windowed --hidden-import=pywinauto program.py
      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: Program_Dosyasi
          path: dist/program.exe
